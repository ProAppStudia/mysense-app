<ion-header class="app-back-toolbar" [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button class="app-back-icon-btn" defaultHref="/tabs/profile" icon="assets/icon/arrow-left-color.svg" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Правова інформація</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding legal-info-page">
  <div class="legal-info-card">
    <div class="legal-info-loading" *ngIf="loading()">
      <ion-spinner name="lines-small"></ion-spinner>
    </div>

    <ion-text color="danger" *ngIf="errorText()">
      <p class="legal-info-error">{{ errorText() }}</p>
    </ion-text>

    <ion-list class="legal-info-menu" lines="none" *ngIf="!loading() && informations().length > 0">
      <ion-item button detail="false" *ngFor="let item of informations()" (click)="openInformation(item)">
        <ion-icon slot="start" [name]="getItemIcon(item.title)"></ion-icon>
        <ion-label>{{ item.title }}</ion-label>
        <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
