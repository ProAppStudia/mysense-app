<ion-header class="app-back-toolbar">
  <ion-toolbar>
    <ion-buttons slot="start">
      <button type="button" class="back-btn app-back-btn" (click)="goBack()">
        <img src="assets/icon/arrow-left-color.svg" alt="Назад" class="back-btn-icon">
        Повернутися
      </button>
    </ion-buttons>
    <ion-title></ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="session-change-page ion-padding">
  <section class="change-card">
    <h2>Перенести сесію</h2>

    <div class="person-row">
      <img [src]="targetPhoto || 'assets/icon/favicon.png'" alt="">
      <div>
        <p class="person-label">Клієнт:</p>
        <p class="person-name">{{ targetName || 'Користувач' }}</p>
      </div>
    </div>

    <div class="block">
      <p class="title">Виберіть дату та час сесії</p>
      <p class="timezone">(за Києвом)</p>
      <div class="datetime-box">
        <button type="button" class="selected-datetime" [class.placeholder]="!hasSelectedDoctorDateTime" (click)="openDoctorDatePicker()">
          {{ selectedDateTimeLabel }}
        </button>
      </div>

      <ion-modal
        cssClass="doctor-date-modal"
        [isOpen]="doctorDatePickerOpen"
        (didDismiss)="closeDoctorDatePicker()"
        [keepContentsMounted]="true"
      >
        <ng-template>
          <ion-datetime
            id="doctor-session-change-datetime"
            class="doctor-datetime"
            mode="md"
            presentation="date-time"
            locale="uk-UA"
            [preferWheel]="false"
            [firstDayOfWeek]="1"
            [showDefaultButtons]="false"
            [value]="selectedDateTimeIso || undefined"
            [min]="doctorDateMinIso"
            [minuteValues]="[0]"
            (ionChange)="onDoctorDateTimeChange($event.detail.value)"
          ></ion-datetime>
        </ng-template>
      </ion-modal>
    </div>

    <div class="summary" *ngIf="sessionType">
      <h3>Інформація про сесію</h3>
      <div class="row">
        <span>Тип терапії</span>
        <strong>{{ sessionType }}</strong>
      </div>
    </div>

    <p class="error" *ngIf="error()">{{ error() }}</p>
    <p class="success" *ngIf="success()">{{ success() }}</p>

    <button
      type="button"
      class="submit-btn"
      (click)="submit()"
      [disabled]="loading() || !sessionId || !hasSelectedDoctorDateTime"
    >
      {{ loading() ? 'Збереження...' : 'Підтвердити' }}
    </button>
  </section>
</ion-content>
