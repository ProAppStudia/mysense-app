<ion-content class="forgot-password-page">
  <div class="auth-login-modal__content forgot-password-modal">
    <div class="auth-login-modal__shell">
      <button type="button" class="auth-login-modal__close" (click)="goBack()" aria-label="Закрити">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7 17L16.8995 7.10051" stroke="#795BDA" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M7 7.00001L16.8995 16.8995" stroke="#795BDA" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>

      <form class="auth-login-modal__card forgot-password-card" [formGroup]="form" (ngSubmit)="submit()">
        <h1 class="auth-login-modal__title">Відновлення паролю</h1>
        <button type="button" class="forgot-password-back-link" (click)="goBack()">Згадали пароль?</button>

        <div class="auth-login-modal__field" [class.is-filled]="!!form.get('email')?.value">
          <label class="auth-login-modal__label">Логін (Email)</label>
          <input id="restore-email" type="email" formControlName="email" autocomplete="email">
        </div>

        <p class="forgot-password-helper-text">
          Новий пароль надійде на вашу електронну адресу, яку ви вказали при реєстрації
        </p>

        <p class="auth-login-modal__error" *ngIf="errorMsg()">{{ errorMsg() }}</p>
        <p class="forgot-password-success" *ngIf="successMsg()">{{ successMsg() }}</p>

        <button type="submit" class="auth-login-modal__submit" [disabled]="loading() || form.invalid">
          <ion-spinner *ngIf="loading()" name="lines-small"></ion-spinner>
          <span *ngIf="!loading()">Відновити пароль</span>
        </button>
      </form>
    </div>
  </div>
</ion-content>
