<ion-content class="payment-page">
  <div class="payment-result">
    <div class="small-content">
      <div class="status-icon" [class.error]="isError">
        <img *ngIf="!isError" src="assets/icon/check_color.png" alt="Успішно">
        <img *ngIf="isError" src="assets/icon/error-icon.png" alt="Помилка">
      </div>

      <h3 class="with-icon" *ngIf="status === 'paid'">
        <img src="https://mysense.care/assets/frontend/img/svg/waving-hand-svgrepo-com.svg" alt="">
        Вітаємо!
      </h3>
      <h3>{{ statusTitle }}</h3>
      <small *ngIf="statusText">{{ statusText }}</small>
    </div>

    <div class="order-details">
      <div class="order-d-line" *ngIf="orderId">
        <div class="text">
          <span class="icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12.8032 3.05282L17.0765 3.7193C19.3612 4.07541 20.5409 5.9766 20.199 8.35357L19.2781 14.7674C18.9363 17.1444 17.2746 18.6029 14.9889 18.2468L10.7165 17.5803C8.43187 17.2242 7.25215 15.3239 7.59308 12.946L8.51499 6.53217C8.85593 4.1552 10.5251 2.69866 12.8032 3.05282Z" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12.3234 8.85156L16.6387 9.49567M11.8281 12.4472L14.4172 12.8344" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8.65726 5.875L5.91115 6.81976C3.71425 7.57284 2.85118 9.65305 3.58348 11.9415L5.52725 18.0985C6.25114 20.3781 8.12579 21.5223 10.3134 20.7693L14.4288 19.3614C15.1181 19.1347 15.6925 18.7533 16.111 18.2716" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          Номер замовлення
        </div>
        <div class="val">{{ orderId }}</div>
      </div>

      <div class="order-d-line" *ngIf="doctorFullname">
        <div class="text">
          <span class="icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M13.9371 5.35938H17.0204C19.5327 5.35938 21.0875 7.13799 21.0875 9.65023V16.7199C21.0875 19.2224 19.5327 21.001 17.0117 21.001H7.29552C4.78426 21.001 3.21094 19.2224 3.21094 16.7199V9.65023C3.21094 7.13799 4.79301 5.35938 7.29552 5.35938H10.3614" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6.40234 17.4598C6.40234 16.4946 7.16419 15.293 9.35826 15.293C11.5523 15.293 12.3142 16.4868 12.3142 17.452" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path fill-rule="evenodd" clip-rule="evenodd" d="M11.2449 11.3641C11.2449 12.4072 10.3993 13.2527 9.35634 13.2527C8.31427 13.2527 7.46875 12.4072 7.46875 11.3641C7.46875 10.3221 8.31427 9.47656 9.35634 9.47656C10.3993 9.47656 11.2449 10.3221 11.2449 11.3641Z" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14.2617 11.8281L17.71 11.8758M15.554 15.5044H17.7101" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path fill-rule="evenodd" clip-rule="evenodd" d="M13.039 7.46891H11.2633C10.7661 7.46891 10.3633 7.06609 10.3633 6.5689V3.90001C10.3633 3.40281 10.7661 3 11.2633 3H13.039C13.5362 3 13.939 3.40281 13.939 3.90001V6.5689C13.939 7.06609 13.5362 7.46891 13.039 7.46891Z" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          Психолог
        </div>
        <div class="val">{{ doctorFullname }}</div>
      </div>

      <div class="order-d-line" *ngIf="sessionDate">
        <div class="text">
          <span class="icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M13.9371 5.35938H17.0204C19.5327 5.35938 21.0875 7.13799 21.0875 9.65023V16.7199C21.0875 19.2224 19.5327 21.001 17.0117 21.001H7.29552C4.78426 21.001 3.21094 19.2224 3.21094 16.7199V9.65023C3.21094 7.13799 4.79301 5.35938 7.29552 5.35938H10.3614" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6.40234 17.4598C6.40234 16.4946 7.16419 15.293 9.35826 15.293C11.5523 15.293 12.3142 16.4868 12.3142 17.452" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path fill-rule="evenodd" clip-rule="evenodd" d="M11.2449 11.3641C11.2449 12.4072 10.3993 13.2527 9.35634 13.2527C8.31427 13.2527 7.46875 12.4072 7.46875 11.3641C7.46875 10.3221 8.31427 9.47656 9.35634 9.47656C10.3993 9.47656 11.2449 10.3221 11.2449 11.3641Z" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14.2617 11.8281L17.71 11.8758M15.554 15.5044H17.7101" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path fill-rule="evenodd" clip-rule="evenodd" d="M13.039 7.46891H11.2633C10.7661 7.46891 10.3633 7.06609 10.3633 6.5689V3.90001C10.3633 3.40281 10.7661 3 11.2633 3H13.039C13.5362 3 13.939 3.40281 13.939 3.90001V6.5689C13.939 7.06609 13.5362 7.46891 13.039 7.46891Z" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          Дата сесії
        </div>
        <div class="val">{{ sessionDate }}</div>
      </div>

      <div class="order-d-line" *ngIf="sessionTime">
        <div class="text">
          <span class="icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M10 20C4.48583 20 0 15.5142 0 10C0 4.48583 4.48583 0 10 0C15.5142 0 20 4.48583 20 10C20 15.5142 15.5142 20 10 20ZM10 1.66667C5.405 1.66667 1.66667 5.405 1.66667 10C1.66667 14.595 5.405 18.3333 10 18.3333C14.595 18.3333 18.3333 14.595 18.3333 10C18.3333 5.405 14.595 1.66667 10 1.66667ZM14.1667 10C14.1667 9.53917 13.7942 9.16667 13.3333 9.16667H10.8333V5C10.8333 4.53917 10.46 4.16667 10 4.16667C9.54 4.16667 9.16667 4.53917 9.16667 5V10C9.16667 10.4608 9.54 10.8333 10 10.8333H13.3333C13.7942 10.8333 14.1667 10.4608 14.1667 10Z" fill="#A498D9"/>
            </svg>
          </span>
          Час
        </div>
        <div class="val">{{ sessionTime }} за Києвом</div>
      </div>

      <div class="order-d-line" *ngIf="paymentDate">
        <div class="text">
          <span class="icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 20.4825H20.3841" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path fill-rule="evenodd" clip-rule="evenodd" d="M10.7983 4.09329L4.63 10.2616C3.13852 11.7531 3.25916 13.7456 4.75454 15.241L8.78825 19.2757C10.2836 20.771 12.2713 20.8956 13.7687 19.3992L19.9359 13.2319C21.4332 11.7346 21.3077 9.74691 19.8123 8.25154L15.7776 4.21685C14.2823 2.72148 12.2947 2.59695 10.7983 4.09329Z" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5.44922 15.9343L16.4733 4.91016" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M11.2734 16.6426L13.0918 14.8242" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          Час оплати
        </div>
        <div class="val">{{ paymentDate }}</div>
      </div>

      <div class="order-d-line" *ngIf="amount">
        <div class="text">
          <span class="icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12.2852 14.4609H17.1598" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12.6758 10.0578L14.1479 11.5299L17.1602 8.51758" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8.21793 5.27595V9.5833V17.8205C8.21793 19.2585 7.05231 20.4242 5.61328 20.4242H17.7511C19.8352 20.4242 20.9911 19.0211 20.9911 16.7522L20.9999 5.27595C20.9999 4.446 20.2059 3.90698 19.5171 4.26016L18.8642 4.6046C18.475 4.80795 18.0255 4.81671 17.6188 4.63962L15.774 3.81941C15.0239 3.49249 14.1939 3.49249 13.4438 3.81941L11.598 4.63962C11.1923 4.81671 10.7418 4.80795 10.3536 4.6046L9.70074 4.26016C9.01188 3.90698 8.21793 4.45476 8.21793 5.27595Z" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5.61341 20.4242C4.88951 20.4242 4.23665 20.1333 3.76865 19.6653C3.29189 19.1885 3 18.5356 3 17.8205V10.5728C3 9.74192 3.79492 9.20386 4.48378 9.55705L5.13665 9.90148C5.52487 10.1048 5.97535 10.1136 6.38108 9.93651L7.62649 9.38094C7.72281 9.33619 7.96995 9.451 8.21805 9.58332" stroke="#A498D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          Сума
        </div>
        <div class="val">{{ amount }} грн.</div>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn primary" (click)="goSessions()">Мої сесії</button>
      <button type="button" class="btn secondary" (click)="goHome()">На головну</button>
    </div>
  </div>
</ion-content>
