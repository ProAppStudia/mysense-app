<ion-list>
  <ion-item (click)="selectSort('price-asc')" button detail="false">
    <ion-icon name="arrow-up-outline" slot="start"></ion-icon>
    <ion-label>За зростанням ціни</ion-label>
  </ion-item>
  <ion-item (click)="selectSort('price-desc')" button detail="false">
    <ion-icon name="arrow-down-outline" slot="start"></ion-icon>
    <ion-label>За спаданням ціни</ion-label>
  </ion-item>
  <ion-item (click)="selectSort('none')" button detail="false">
    <ion-icon name="close-outline" slot="start"></ion-icon>
    <ion-label>Без сортування</ion-label>
  </ion-item>
</ion-list>
